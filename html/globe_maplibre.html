<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LCM-10 Globe – MapLibre GL JS</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06080f; }
    #map { position: absolute; inset: 0; }

    #legend {
      position: absolute;
      bottom: 36px;
      left: 12px;
      background: rgba(10, 12, 20, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 14px 12px;
      color: #dde;
      font: 12px/1.6 system-ui, sans-serif;
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      z-index: 10;
      min-width: 190px;
    }
    #legend h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .swatch {
      width: 13px;
      height: 13px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.18);
    }

    /* opacity control */
    #opacity-wrap {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #aab;
    }
    #opacity-slider {
      flex: 1;
      accent-color: #4fc3f7;
      cursor: pointer;
    }

    /* loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06080f;
      color: rgba(200, 210, 230, 0.7);
      font: 15px/1 system-ui, sans-serif;
      letter-spacing: 0.02em;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    #loading.hidden { opacity: 0; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="legend">
  <h3>LCM-10 Land Cover</h3>
  <!-- rows injected by JS -->
  <div id="opacity-wrap">
    <label for="opacity-slider">Opacity</label>
    <input id="opacity-slider" type="range" min="0" max="100" value="90">
    <span id="opacity-val">90%</span>
  </div>
</div>

<div id="loading">Loading&hellip;</div>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script>
// ---------------------------------------------------------------------------
// LCM-10 class definitions
// ---------------------------------------------------------------------------
const CLASSES = [
  { value:  10, color: '#006400', label: 'Tree cover' },
  { value:  20, color: '#FFBB22', label: 'Shrubland' },
  { value:  30, color: '#FFFF4C', label: 'Grassland' },
  { value:  40, color: '#F096FF', label: 'Cropland' },
  { value:  50, color: '#0096A0', label: 'Herbaceous wetland' },
  { value:  60, color: '#00CF75', label: 'Mangroves' },
  { value:  70, color: '#FAE6A0', label: 'Moss and lichen' },
  { value:  80, color: '#B4B4B4', label: 'Bare/sparse vegetation' },
  { value:  90, color: '#FA0000', label: 'Built-up' },
  { value: 100, color: '#0064C8', label: 'Permanent water bodies' },
  { value: 110, color: '#F0F0F0', label: 'Snow and ice' },
  { value: 254, color: '#0A0A0A', label: 'Unclassifiable' },
];

// Build legend rows
const legend = document.getElementById('legend');
const opacityWrap = document.getElementById('opacity-wrap');
CLASSES.forEach(cls => {
  const row = document.createElement('div');
  row.className = 'legend-row';
  row.innerHTML =
    `<div class="swatch" style="background:${cls.color}"></div>` +
    `<span>${cls.label}</span>`;
  legend.insertBefore(row, opacityWrap);
});

// ---------------------------------------------------------------------------
// titiler colormap (band value → [R, G, B, A])
// ---------------------------------------------------------------------------
function hexToRGBA(hex) {
  return [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16),
    255,
  ];
}
const colormap = {};
CLASSES.forEach(cls => { colormap[cls.value] = hexToRGBA(cls.color); });

// ---------------------------------------------------------------------------
// Source URLs
// ---------------------------------------------------------------------------
const COG_URL = 'https://vito-lcf-shapefiles-waw4-1.s3.waw4-1.cloudferro.com/LCM-10_v100_2020_MAP_lat-lon.tif';

const lcm10TilesUrl =
  'https://titiler.xyz/cog/tiles/WebMercatorQuad/{z}/{x}/{y}@2x' +
  '?url=' + encodeURIComponent(COG_URL) +
  '&bidx=1&bidx=2' +
  '&colormap=' + encodeURIComponent(JSON.stringify(colormap));

// USGS Blue Marble – WMS 1.3.0 with EPSG:4326 (avoids WebMercator polar artefacts)
const WMS_ROOT =
  'https://basemap.nationalmap.gov/arcgis/services/USGSImageryOnly/MapServer/WMSServer';
const blueMarbletileUrl =
  WMS_ROOT +
  '?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0' +
  '&LAYERS=0&STYLES=&FORMAT=image%2Fpng&TRANSPARENT=false' +
  '&CRS=EPSG%3A4326&WIDTH=256&HEIGHT=256&BBOX={bbox-epsg-4326}';

// ---------------------------------------------------------------------------
// Map
// ---------------------------------------------------------------------------
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {},
    layers: [],
    sky: {
      'sky-color': '#0d1b3e',
      'sky-horizon-blend': 0.5,
      'horizon-color': '#1a2f5e',
      'horizon-fog-blend': 0.6,
      'fog-color': '#0d1b3e',
      'fog-ground-blend': 0.9,
    },
    glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
  },
  center: [10, 20],
  zoom: 1.5,
  projection: { type: 'globe' },
  attributionControl: { compact: true },
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

map.on('load', () => {
  // --- Blue Marble background ---
  map.addSource('blue-marble', {
    type: 'raster',
    tiles: [blueMarbletileUrl],
    tileSize: 256,
    attribution: '© USGS National Map',
  });
  map.addLayer({ id: 'blue-marble', type: 'raster', source: 'blue-marble' });

  // --- LCM-10 foreground ---
  map.addSource('lcm10', {
    type: 'raster',
    tiles: [lcm10TilesUrl],
    tileSize: 512,
    attribution: '© VITO 2026. Contains Copernicus Land Monitoring Service &amp; modified Copernicus Sentinel data (2020).',
  });
  map.addLayer({
    id: 'lcm10',
    type: 'raster',
    source: 'lcm10',
    paint: { 'raster-opacity': 0.9 },
  });

  // Hide loading overlay
  const loading = document.getElementById('loading');
  loading.classList.add('hidden');
  setTimeout(() => loading.remove(), 700);
});

// ---------------------------------------------------------------------------
// Opacity slider
// ---------------------------------------------------------------------------
const slider = document.getElementById('opacity-slider');
const opacityVal = document.getElementById('opacity-val');
slider.addEventListener('input', () => {
  const v = slider.value / 100;
  opacityVal.textContent = slider.value + '%';
  if (map.getLayer('lcm10')) {
    map.setPaintProperty('lcm10', 'raster-opacity', v);
  }
});
</script>
</body>
</html>
