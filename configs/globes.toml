# Batch rendering configuration for orthographic_globe.py.
#
# Run:  python scripts/orthographic_globe.py --config configs/globes.toml
#
# Each [[render]] entry produces one output PNG.  Settings in [global] apply
# to all renders and can be overridden per [[render]] entry.

[global]
cog_url              = "https://vito-lcf-shapefiles-waw4-1.s3.waw4-1.cloudferro.com/LCM-10_v100_2020_MAP_lat-lon.tif"
downsample_factor    = 8
bg_cog_url           = "https://vito-lcf-shapefiles-waw4-1.s3.waw4-1.cloudferro.com/world_topo_bathy_200407_WGS84.tif"
bg_downsample_factor = 8
background           = "transparent"
globe_size_px        = 2100
globe_gap_px         = 200
dpi                  = 300
coastlines           = true
country_borders      = false
border_color         = "white"
border_width         = 0.4

# ---------------------------------------------------------------------------
# 1 globe — Europe-Africa
# ---------------------------------------------------------------------------

[[render]]
name          = "1_globe_europe"
output        = "images/1_globe_europe.png"
globe_centers = [[25.0, 30.0]]

# ---------------------------------------------------------------------------
# 2 globes — Western + Eastern Hemispheres (default layout)
# ---------------------------------------------------------------------------

[[render]]
name          = "2_globes"
output        = "images/2_globes.png"
globe_centers = [[-90.0, 15.0], [70.0, 15.0]]

# ---------------------------------------------------------------------------
# 3 globes — Americas / Europe-Africa / Asia-Pacific
# ---------------------------------------------------------------------------

[[render]]
name          = "3_globes"
output        = "images/3_globes.png"
globe_centers = [[-90.0, 15.0], [25.0, 30.0], [130.0, 20.0]]

# ---------------------------------------------------------------------------
# MapLibre link — parse camera position directly from a live globe URL hash.
# Hash format: #zoom/lat/lng[/bearing/pitch]  (bearing & pitch are ignored).
# ---------------------------------------------------------------------------

[[render]]
name         = "maplibre_link"
output       = "images/maplibre_link.png"
maplibre_url = "https://raw.githack.com/VITO-RS-Vegetation/lcfm-visuals/5ed1c6a75b7cbec0a8878c8f0c13e25d8d0655ed/html/globe_maplibre.html#6.88/27.841/-80.949"
aspect_ratio = 1.78   # 16:9 — wider screen-like crop
globe_gap_px = 0      # no margin — content fills edge to edge
